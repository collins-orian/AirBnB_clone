<!DOCTYPE html>
<html lang="en">
	<head>

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Header and footer 7</title>
		<link rel="stylesheet" type="text/css" href="styles/4-common.css" />

		<link rel="stylesheet" type="text/css" href="styles/6-filters.css" />
		<link rel="image" type="image/png" href="./images/icon.png" />

	<body>
		<header>
			<div class="logo">
				<img src="./images/icon.png" id="logo_image" />hbnb

						<li>
							<h2>Arizona:</h2>
						</li>

								<li>Page</li>

						</li>
						<li>
							<h2>California:</h2>
						</li>
						<li>
							<ul>
								<li>San Francisco</li>
								<li>Los Altos</li>
							</ul>
						</li>
					</ul>
				</div>
				<div class="amenities">
					<h3>Amenities</h3>
					<h4>Internet, Kitchen...</h4>
					<ul class="popover">
						<li>Internet</li>
						<li>TV</li>
						<li>Kitchen</li>
						<li>Iron</li>
					</ul>

		<footer>
